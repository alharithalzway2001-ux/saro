<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سارو تحبيني لو لا؟</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap">
</head>
<body>

    <!-- حاوية اللعبة التفاعلية المحدثة -->
    <div class="game-container" id="game-card">
        
        <!-- واجهة السؤال الرئيسية -->
        <div id="question-screen">
            <div class="gif-container">
                <!-- الستيكر الأول من الأعلى: tonton friends اللطيفين معاً للبداية -->
                <img src="https://media.tenor.com/tHqgU7E6mzoAAAAi/tonton-friends-tonton.gif" alt="Tonton Friends Together" id="dynamic-gif" class="main-gif">
            </div>
            <h1 class="question-text">سارو تحبيني لو لا؟</h1>
            <div class="buttons-group">
                <button id="yes-btn" class="btn yes-btn">أي!</button>
                <button id="no-btn" class="btn no-btn">لا</button>
            </div>
        </div>

        <!-- واجهة النتيجة عند الضغط على أي -->
        <div id="result-screen" class="hidden">
            <div class="gif-container">
                <!-- الستيكر الأخير من الأسفل: الكلب اللطيف المبتهج بوجنتين حمراوين -->
                <img src="https://media.tenor.com/vHqgU9E6mzoAAAAi/tonton-friends-chubby.gif" alt="Tonton Friends Happy Dog" class="main-gif">
            </div>
            <h1 class="result-text">حتى أنا ❤️</h1>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
