<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سارو تحبيني 🥹</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap">
</head>
<body>

    <!-- الحاوية الرئيسية للبطاقة التفاعلية -->
    <div class="game-container" id="game-card">
        
        <!-- الواجهة الأولى (السؤال الرئيسي) -->
        <div id="question-screen">
            <div class="gif-container">
                <!-- الستيكر الأول محلي من المجلد مباشرة -->
                <img src="start.gif" alt="Tonton Friends" id="dynamic-gif" class="main-gif">
            </div>
            <h1 class="question-text">سارو تحبيني 🥹</h1>
            <div class="buttons-group">
                <button id="yes-btn" class="btn yes-btn">أي!</button>
                <button id="no-btn" class="btn no-btn">لا</button>
            </div>
        </div>

        <!-- الواجهة الثانية (النتيجة بعد الضغط على أي!) -->
        <div id="result-screen" class="hidden">
            <div class="gif-container">
                <!-- الستيكر الثالث محلي من المجلد مباشرة -->
                <img src="success.gif" alt="Tonton Friends Success" class="main-gif">
            </div>
            <h1 class="result-text">حتى أنا ❤️</h1>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
